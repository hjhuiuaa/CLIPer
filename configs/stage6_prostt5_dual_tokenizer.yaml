stage: stage6
backbone_name: /data/huggs/hujh/CLIPer/models/Rostlab-ProstT5
window_size: 1024
batch_tokens: 2048
optimizer: adamw
lr: 0.00012
weight_decay: 0.02
max_epochs: 30
early_stop_patience: 4
seed: 42
threshold_search:
  min: 0.05
  max: 0.95
  step: 0.05

dropout: 0.1
freeze_backbone: true
eval_stride: 512
top_k_heuristic: 4
num_workers: 0
device: cuda

local_context:
  enabled: true
  radius: 1
  mode: concat_window
  include_self: true

classifier_head:
  type: cnn
  dropout: 0.30
  activation: relu
  conv_channels: [256, 256, 256]
  kernel_size: 3
  dilations: [1, 2, 4]

dual_tokenizer:
  enabled: true
  fusion: weighted_logits
  branches:
    plain:
      weight: 0.5
      tokenizer_name: null
      motif:
        enabled: false
    special:
      weight: 0.5
      tokenizer_name: configs/prosite_tokenizer
      motif:
        enabled: true
        source: configs/prosite_motif_library_full.json
        matching: prosite
        tokenization: special_token

motif:
  enabled: false

contrastive:
  enabled: false
  weight: 0.2
  temperature: 0.1
  proj_dim: 128
  max_samples_per_class: 256

train_fasta: dataset/disprot_202312_linker_label.fasta
caid_fasta: dataset/linker.fasta
split_manifest: artifacts/splits/disprot_split_seed42.json
output_dir: artifacts/runs/stage6_prostt5_dual_tokenizer
experiment_prefix: exp
save_every: 500
print_every: 20
eval_every: 200
auto_start_tensorboard: true
tensorboard_host: 0.0.0.0
tensorboard_port: 6006
use_wandb: false
wandb_entity: 3151599052-nankai-university
wandb_project: CLIPer
wandb_mode: online
wandb_run_name: null
wandb_group: stage6_dual_tokenizer
wandb_tags: [stage6, bce, cnn, dual-tokenizer, weighted-logits]
